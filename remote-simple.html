<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Remote — Simple</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0f; color: #e8e8f0;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px; gap: 14px;
}
input {
  width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
  border: 1px solid #2a2a32; background: #13131a; color: #fff;
  font-size: 16px; text-align: center; outline: none;
}
input:focus { border-color: #c084fc; }
button {
  width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
  border: none; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-connect { background: linear-gradient(135deg, #c084fc, #818cf8); color: #fff; }
.btn-send    { background: linear-gradient(135deg, #34d399, #059669); color: #fff; }
.btn-stop    { background: #1c1c24; color: #f87171; border: 1px solid #3f3f46; }
.slider-row  { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 6px; }
.slider-label { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
input[type=range] { width: 100%; accent-color: #c084fc; cursor: pointer; }
.big { font-size: 48px; font-weight: 800; color: #c084fc; text-align: center; }
.status { font-size: 12px; color: #555; text-align: center; }
.status.ok  { color: #4ade80; }
.status.err { color: #f87171; }
</style>
</head>
<body>

<div class="big" id="big-val">50</div>

<input type="text" id="host-id" placeholder="Paste Host ID here" />
<button class="btn-connect" id="btn-connect" onclick="toggleConnect()">Connect</button>
<p class="status" id="status">Disconnected</p>

<div class="slider-row">
  <div class="slider-label"><span>Intensity</span><span id="pct">50%</span></div>
  <input type="range" id="slider" min="0" max="100" value="50" oninput="onSlider(this.value)">
</div>

<button class="btn-send" id="btn-send" onclick="sendConstant()" disabled>⚡ Send</button>
<button class="btn-stop" id="btn-stop" onclick="sendStop()" disabled>⏹ Stop</button>

<script>
let conn = null;
let intensity = 50;
const peer = new Peer();

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

function setConnected(yes) {
  document.getElementById('btn-send').disabled = !yes;
  document.getElementById('btn-stop').disabled = !yes;
  document.getElementById('btn-connect').textContent = yes ? 'Disconnect' : 'Connect';
  document.getElementById('btn-connect').style.background = yes
    ? 'linear-gradient(135deg,#f87171,#dc2626)'
    : 'linear-gradient(135deg,#c084fc,#818cf8)';
}

function toggleConnect() {
  if (conn) {
    conn.close();
    conn = null;
    setConnected(false);
    setStatus('Disconnected');
    return;
  }
  const id = document.getElementById('host-id').value.trim();
  if (!id) return;
  setStatus('Connecting...');
  conn = peer.connect(id);
  conn.on('open', () => { setConnected(true); setStatus('Connected ✓', 'ok'); });
  conn.on('error', () => { setConnected(false); setStatus('Connection failed', 'err'); conn = null; });
  conn.on('close', () => { setConnected(false); setStatus('Disconnected', 'err'); conn = null; });
}

function onSlider(val) {
  intensity = parseInt(val);
  document.getElementById('pct').textContent = intensity + '%';
  document.getElementById('big-val').textContent = intensity;
}

function sendConstant() {
  if (!conn) return;
  conn.send({ action: 'constant', val: intensity });
}

function sendStop() {
  if (!conn) return;
  conn.send({ action: 'stop' });
}

// Still expose API for console use
window.RemoteAPI = {
  connect: (id) => { document.getElementById('host-id').value = id; toggleConnect(); },
  sendConstant: (val) => { onSlider(val); sendConstant(); },
  sendPattern: (vals) => { if (conn) conn.send({ action: 'pattern', vals }); },
  sendStop
};
</script>
</body>
</html>
