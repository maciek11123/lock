<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Remote — Simple</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0f; color: #e8e8f0;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px; gap: 14px;
}
button {
  width: 100%; max-width: 320px; padding: 14px; border-radius: 12px;
  border: none; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-send    { background: linear-gradient(135deg, #34d399, #059669); color: #fff; }
.btn-stop    { background: #1c1c24; color: #f87171; border: 1px solid #3f3f46; }
.btn-dice    { background: linear-gradient(135deg, #c084fc, #7c3aed); color: #fff; }
.slider-row  { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 6px; }
.slider-label { display: flex; justify-content: space-between; font-size: 13px; color: #666; }
input[type=range] { width: 100%; accent-color: #c084fc; cursor: pointer; }
.big { font-size: 48px; font-weight: 800; color: #c084fc; text-align: center; }
.status { font-size: 12px; color: #555; text-align: center; }
.status.ok  { color: #4ade80; }
.status.err { color: #f87171; }
.status.wait { color: #facc15; }
/* Extras */
.btn-extras { background: #13131a; color: #a78bfa; border: 1px solid #2a2a3a; font-size: 13px; padding: 10px; }
.extras { width: 100%; max-width: 320px; display: none; flex-direction: column; gap: 14px; background: #101017; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; }
.extras.open { display: flex; }
.extras-sec { display: flex; flex-direction: column; gap: 8px; }
.extras-title { font-size: 13px; color: #888; font-weight: 700; }
.alarm-row, .lock-row { display: flex; align-items: center; gap: 6px; }
.time-in { width: 56px; padding: 8px; border-radius: 8px; border: 1px solid #3f3f46; background: #1c1c24; color: #e8e8f0; font-size: 14px; text-align: center; }
.mini-set { width: auto; flex: 1; padding: 9px; border-radius: 8px; border: none; background: #6d28d9; color: #fff; font-size: 13px; font-weight: 700; }
.mini-cancel { width: auto; padding: 9px 12px; border-radius: 8px; border: 1px solid #f87171; background: transparent; color: #f87171; font-size: 13px; font-weight: 700; }
.mini-lock, .mini-unlock { width: auto; flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #3f3f46; background: #1c1c24; color: #e8e8f0; font-size: 13px; font-weight: 700; }
.mini-lock.active { background: #7f1d1d; border-color: #f87171; color: #fff; }
.mini-unlock.active { background: #065f46; border-color: #34d399; color: #fff; }
.extras-status { font-size: 12px; color: #888; text-align: center; min-height: 16px; }
</style>

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/lock/manifest-simple.json">
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/lock/sw.js', {scope: '/lock/'});
  }
  </script>
  <style>
  #pwa-install-btn {
    position: fixed; bottom: 16px; right: 16px; z-index: 9999;
    background: #7c3aed; color: #fff; border: none; border-radius: 50px;
    padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,58,237,.5); display: none;
    align-items: center; gap: 8px;
  }
  #pwa-install-btn.visible {{ display: flex; }}
  </style>
</head>
<body>

<div class="big" id="big-val">50</div>
<p class="status wait" id="status">Looking up host...</p>

<div class="slider-row">
  <div class="slider-label"><span>Intensity</span><span id="pct">50%</span></div>
  <input type="range" id="slider" min="0" max="100" value="50" oninput="onSlider(this.value)">
</div>

<button class="btn-send" id="btn-send" onclick="togglePulse()" disabled>⚡ Pulse</button>
<button class="btn-dice" id="btn-dice" onclick="toggleDice()" disabled>🎲 Dice — 3h</button>
<div id="batt-indicator" style="position:fixed;top:12px;right:12px;font-size:12px;color:#a78bfa;opacity:0;transition:opacity .5s;background:#13131a;padding:4px 10px;border-radius:20px;border:1px solid #2a2a3a">🔋</div>
<button class="btn-stop" id="btn-stop" onclick="stopAll()" disabled>⏹ Stop</button>

<button class="btn-extras" id="btn-extras" onclick="toggleExtras()">⋯ Extras</button>
<div id="extras-panel" class="extras">
  <div class="extras-sec">
    <div class="extras-title">⏰ Alarm</div>
    <div class="alarm-row">
      <input type="number" id="alarm-hr" min="0" max="23" placeholder="HH" class="time-in">
      <span style="color:#666">:</span>
      <input type="number" id="alarm-min" min="0" max="59" placeholder="MM" class="time-in">
      <button class="mini-set" onclick="setAlarm()">Set</button>
      <button class="mini-cancel" onclick="cancelAlarm()">✕</button>
    </div>
    <div class="extras-status" id="alarm-status"></div>
  </div>
  <div class="extras-sec">
    <div class="extras-title">🔒 Lock</div>
    <div class="lock-row">
      <button class="mini-lock" id="lock-btn" onclick="sendLock()">🔒 Lock</button>
      <button class="mini-unlock" id="unlock-btn" onclick="sendUnlock()">🔓 Unlock</button>
    </div>
    <div class="extras-status" id="lock-status"></div>
  </div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/maciek11123/lock/main/id.json';

let conn = null;
let intensity = 50;
const peer = new Peer();

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

function setConnected(yes) {
  document.getElementById('btn-send').disabled = !yes;
  document.getElementById('btn-stop').disabled = !yes;
  document.getElementById('btn-dice').disabled = !yes;
}

async function fetchAndConnect() {
  try {
    setStatus('Looking up host...', 'wait');
    const res = await fetch(GITHUB_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error('id.json not found');
    const data = await res.json();
    setStatus(`Connecting to ${data.id}...`, 'wait');
    peer.on('open', () => {
      conn = peer.connect(data.id);
      conn.on('open', () => { setConnected(true); setStatus('Connected ✓', 'ok'); });
      conn.on('data', d => {
        if (d && d.type === 'battery') {
          const icon = d.pct > 70 ? '🔋' : d.pct > 30 ? '🪫' : '⚠️';
          const el = document.getElementById('batt-indicator');
          if (el) { el.textContent = `${icon} ${d.pct}%`; el.style.opacity = '1'; }
        } else if (d && d.action === 'lock_status') {
          updateLockUI(d.locked);
        } else if (d && d.action === 'alarm_started') {
          const el = document.getElementById('alarm-status');
          if (el) el.textContent = '🔔 Alarm firing!';
        }
      });
      conn.on('error', () => { setConnected(false); setStatus('Failed — retrying...', 'err'); setTimeout(fetchAndConnect, 3000); });
      conn.on('close', () => { setConnected(false); setStatus('Disconnected — retrying...', 'err'); setTimeout(fetchAndConnect, 3000); });
    });
  } catch(e) {
    setStatus('Host not found. Retrying...', 'err');
    setTimeout(fetchAndConnect, 5000);
  }
}

fetchAndConnect();

function onSlider(val) {
  intensity = parseInt(val);
  document.getElementById('pct').textContent = intensity + '%';
  document.getElementById('big-val').textContent = intensity;
}

let pulseTimer = null;
let pulseOn = false;
let _diceOn = false;

function sendConstant() { if (conn) conn.send({ action: 'constant', val: intensity }); }
function sendStop() { if (conn) conn.send({ action: 'stop' }); }

function stopAll() {
  if (pulseTimer) {
    clearInterval(pulseTimer);
    pulseTimer = null;
    pulseOn = false;
    const btn = document.getElementById('btn-send');
    btn.textContent = '⚡ Pulse';
    btn.style.background = 'linear-gradient(135deg, #34d399, #059669)';
  }
  if (_diceOn) { if (conn) conn.send({ action: 'program_cancel' }); resetDiceBtn(); }
  sendStop();
}

function togglePulse() {
  if (pulseTimer) {
    // Stop pulsing
    clearInterval(pulseTimer);
    pulseTimer = null;
    pulseOn = false;
    sendStop();
    const btn = document.getElementById('btn-send');
    btn.textContent = '⚡ Pulse';
    btn.style.background = 'linear-gradient(135deg, #34d399, #059669)';
  } else {
    // Start pulsing: 1s on, 1s off
    const btn = document.getElementById('btn-send');
    btn.textContent = '⏸ Stop';
    btn.style.background = 'linear-gradient(135deg, #f87171, #dc2626)';
    // Start immediately with ON
    pulseOn = true;
    sendConstant();
    pulseTimer = setInterval(() => {
      pulseOn = !pulseOn;
      if (pulseOn) sendConstant();
      else sendStop();
    }, 1000);
  }
}

function resetDiceBtn() {
  _diceOn = false;
  const btn = document.getElementById('btn-dice');
  btn.textContent = '🎲 Dice — 3h';
  btn.style.background = 'linear-gradient(135deg, #c084fc, #7c3aed)';
}

function toggleDice() {
  if (!conn) return;
  if (_diceOn) {
    conn.send({ action: 'program_cancel' });
    resetDiceBtn();
  } else {
    // Stop any manual pulse first
    if (pulseTimer) {
      clearInterval(pulseTimer); pulseTimer = null; pulseOn = false;
      const pb = document.getElementById('btn-send');
      pb.textContent = '⚡ Pulse';
      pb.style.background = 'linear-gradient(135deg, #34d399, #059669)';
    }
    // Host runs the whole 3h program; this phone can lock afterwards
    conn.send({ action: 'program', onMs: 3000, minPow: 20, maxPow: 100, minOff: 5000, maxOff: 1200000, durationMs: 10800000 });
    _diceOn = true;
    const btn = document.getElementById('btn-dice');
    btn.textContent = '⏹ Stop Dice';
    btn.style.background = 'linear-gradient(135deg, #f87171, #dc2626)';
  }
}

function toggleExtras() {
  document.getElementById('extras-panel').classList.toggle('open');
}

// ── Alarm ──
let _alarmEpoch = null, _alarmTick = null;
function setAlarm() {
  if (!conn) { document.getElementById('alarm-status').textContent = 'Not connected'; return; }
  const hr  = parseInt(document.getElementById('alarm-hr').value);
  const min = parseInt(document.getElementById('alarm-min').value);
  if (isNaN(hr) || isNaN(min) || hr < 0 || hr > 23 || min < 0 || min > 59) {
    document.getElementById('alarm-status').textContent = '⚠️ Invalid time'; return;
  }
  const now = new Date(), target = new Date();
  target.setHours(hr, min, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  _alarmEpoch = target.getTime();
  conn.send({ action: 'alarm', startAt: _alarmEpoch });
  startAlarmCountdown();
}
function cancelAlarm() {
  _alarmEpoch = null;
  if (_alarmTick) { clearInterval(_alarmTick); _alarmTick = null; }
  if (conn) conn.send({ action: 'alarm_cancel' });
  document.getElementById('alarm-status').textContent = 'Alarm cancelled';
  setTimeout(() => { const e = document.getElementById('alarm-status'); if (e) e.textContent = ''; }, 2500);
}
function startAlarmCountdown() {
  if (_alarmTick) clearInterval(_alarmTick);
  _alarmTick = setInterval(() => {
    if (!_alarmEpoch) { clearInterval(_alarmTick); return; }
    const diff = _alarmEpoch - Date.now();
    if (diff <= 0) { clearInterval(_alarmTick); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const fmt = new Date(_alarmEpoch).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('alarm-status').textContent = `⏰ ${fmt} — ${h}h ${m}m ${s}s`;
  }, 1000);
}

// ── Lock ──
function sendLock()   { if (conn) conn.send({ action: 'lock' }); }
function sendUnlock() { if (conn) conn.send({ action: 'unlock' }); }
function updateLockUI(locked) {
  const lb = document.getElementById('lock-btn');
  const ub = document.getElementById('unlock-btn');
  const st = document.getElementById('lock-status');
  if (locked) { lb.classList.add('active'); ub.classList.remove('active'); st.textContent = '🔒 Host is locked'; }
  else        { ub.classList.add('active'); lb.classList.remove('active'); st.textContent = '🔓 Host is unlocked'; }
}

window.RemoteAPI = {
  sendConstant: (val) => { onSlider(val); sendConstant(); },
  sendPattern: (vals) => { if (conn) conn.send({ action: 'pattern', vals }); },
  sendStop
};
</script>

  <button id="pwa-install-btn" onclick="pwaInstall()">⬇ Install App</button>
  <script>
  var _deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault(); _deferredPrompt = e;
    document.getElementById('pwa-install-btn').classList.add('visible');
  });
  window.addEventListener('appinstalled', function() {
    document.getElementById('pwa-install-btn').classList.remove('visible');
  });
  function pwaInstall() {
    if (_deferredPrompt) {
      _deferredPrompt.prompt();
      _deferredPrompt.then(function(){ _deferredPrompt = null; });
    } else {
      alert('Use browser menu → "Add to Home Screen" or "Install App"');
    }
  }
  </script>
</body>
</html>
