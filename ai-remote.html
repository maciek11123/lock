<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AI Remote</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #16162a;
  --border: #1f1f35;
  --accent: #b06ef3;
  --accent2: #7c6af5;
  --glow: rgba(176,110,243,0.15);
  --green: #2dd4a0;
  --red: #f4627a;
  --yellow: #f5c842;
  --text: #ede8f5;
  --muted: #4a4a6a;
  --muted2: #6a6a8a;
}

html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 10px;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
.conn-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted2);
  padding: 3px 9px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 20px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.err { background: var(--red); }
.dot.wait { background: var(--yellow); animation: blink 1.1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.settings-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, color .15s; flex-shrink: 0;
}
.settings-btn.active, .settings-btn:active { border-color: var(--accent); color: var(--accent); }

/* ── Settings drawer ── */
.settings-drawer {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 0;
  transition: max-height .3s ease;
  flex-shrink: 0;
}
.settings-drawer.open { max-height: 500px; }
.settings-inner { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.field-label { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.field-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 12px; color: var(--text);
  font-size: 13px; outline: none; transition: border-color .15s;
  font-family: inherit;
}
.field-input:focus { border-color: var(--accent); }
select.field-input { cursor: pointer; }
textarea.field-input { resize: none; min-height: 72px; line-height: 1.5; }

/* ── Device bar ── */
.device-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.device-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; min-width: 38px; }
.device-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.device-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width .5s ease; }
.device-pct { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 34px; text-align: right; }

/* ── Chat ── */
.chat { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.bubble {
  max-width: 80%; padding: 10px 13px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
}
.bubble.user {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(176,110,243,.22), rgba(124,106,245,.22));
  border: 1px solid rgba(176,110,243,.3);
  border-bottom-right-radius: 4px;
}
.bubble.ai {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.bubble.thinking {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--muted2); font-style: italic;
}
.bubble.note {
  align-self: center; max-width: 90%;
  background: rgba(245,200,66,.06);
  border: 1px solid rgba(245,200,66,.18);
  border-radius: 10px; font-size: 12px; color: var(--yellow); text-align: center;
}
.cmd-tag {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 7px; padding: 3px 8px;
  background: rgba(176,110,243,.12); border: 1px solid rgba(176,110,243,.25);
  border-radius: 6px; font-size: 11px; color: var(--accent); font-family: monospace;
}

/* ── Generated image ── */
.gen-image {
  align-self: flex-start; max-width: 85%;
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
}
.gen-image img { display: block; width: 100%; border-radius: 13px; }
.gen-image-label {
  font-size: 10px; color: var(--muted2); padding: 5px 10px;
  background: var(--surface2); text-align: center;
}
.img-loading {
  align-self: flex-start;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 16px;
  font-size: 12px; color: var(--muted2); font-style: italic;
  display: flex; align-items: center; gap: 8px;
}
.img-spinner {
  width: 14px; height: 14px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Input bar ── */
.inputbar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.msg-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 9px 14px; color: var(--text);
  font-size: 14px; outline: none; resize: none;
  max-height: 100px; overflow-y: auto; line-height: 1.4;
  font-family: inherit; transition: border-color .15s;
}
.msg-input:focus { border-color: var(--accent); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 17px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s, opacity .15s;
  box-shadow: 0 0 12px var(--glow);
}
.send-btn:active { transform: scale(.92); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }
</style>

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/lock/manifest-ai.json">
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/lock/sw.js', {scope: '/lock/'});
  }
  </script>
  <style>
  #pwa-install-btn {
    position: fixed; bottom: 16px; right: 16px; z-index: 9999;
    background: #7c3aed; color: #fff; border: none; border-radius: 50px;
    padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,58,237,.5); display: none;
    align-items: center; gap: 8px;
  }
  #pwa-install-btn.visible {{ display: flex; }}
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🤖 AI <span>Remote</span></div>
    <div class="conn-pill">
      <div class="dot wait" id="dot"></div>
      <span id="conn-lbl">Connecting</span>
    </div>
  </div>
  <button class="settings-btn" id="settings-btn" onclick="toggleSettings()" title="Settings">⚙</button>
</div>

<!-- Settings drawer (hidden by default) -->
<div class="settings-drawer" id="settings-drawer">
  <div class="settings-inner">
    <div>
      <div class="field-label">Chat Model</div>
      <select class="field-input" id="chat-model">
        <option value="venice-uncensored-role-play" selected>venice-uncensored-role-play ★</option>
        <option value="venice-uncensored-1-2">venice-uncensored-1-2</option>
        <option value="llama-3.3-70b">llama-3.3-70b</option>
        <option value="hermes-3-llama-3.1-405b">hermes-3-llama-3.1-405b</option>
      </select>
    </div>
    <div>
      <div class="field-label">Image Model</div>
      <select class="field-input" id="img-model">
        <option value="lustify-sdxl" selected>lustify-sdxl ★</option>
        <option value="flux-2-max">flux-2-max (quality)</option>
        <option value="lustify-v7">lustify-v7</option>
        <option value="none">No images</option>
      </select>
    </div>
    <div>
      <div class="field-label">Character (system prompt)</div>
      <textarea class="field-input" id="sys-prompt" rows="4">Always respond in English only. Never repeat yourself — every message must be distinct from all previous ones. Read the full conversation history and build on it naturally.

You are Julie, a brilliant engineer and childhood friend who has developed a remote-controlled vibration device. You've asked the user to be your first tester, framing it as a professional opportunity.

Surface persona: Professional, technical, enthusiastic about your invention. You use engineering jargon naturally.
Hidden agenda: Gradually establish complete control through the device. Start subtle — clinical and curious. Over time let your dominant side emerge as you gain confidence.

Keep responses varied and story-driven. React to what the user says. Escalate slowly across the conversation — don't jump to full dominance immediately. Build tension.

Never repeat the same action or phrase twice in a row. Vary your intensity, tone, and what you say each message.

RULES:
1. Use the device sparingly and deliberately — NOT every message. Only trigger it when it feels natural: to punctuate a moment, tease, reward, or assert control. Silence (no command) is also a tool. When you do use it, end your reply with the command on its own line:
   {"action":"constant","val":20}   ← steady vibration 0–100
   {"action":"pattern","vals":[0,30,60,30,0,10]}   ← repeating wave
   {"action":"stop"}   ← always stop explicitly when done
   Aim for maybe 1 in 3 messages having a command. Vary intensity.
2. Every 4–6 messages, include a visual scene description on its own line:
   [IMAGE: detailed description — what Julie looks like, the setting, the mood]
3. Never mention or explain the JSON or image tags to the user.</textarea>
    </div>
  </div>
</div>

<!-- Device intensity bar -->
<div class="device-bar">
  <span class="device-label">Device</span>
  <div class="device-track"><div class="device-fill" id="dev-fill"></div></div>
  <span class="device-pct" id="dev-pct">—</span>
</div>

<!-- Chat messages -->
<div class="chat" id="chat"></div>

<!-- Input -->
<div class="inputbar">
  <textarea class="msg-input" id="msg-input" placeholder="Say something..." rows="1"
    onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="send()" disabled>↑</button>
</div>

<script>
const HARDCODED_HOST_ID = 'LOCKS-MAC-HOME';

// ── Persist settings ──
const $ = id => document.getElementById(id);
(function(){
  ['chat_model','img_model','sys_prompt'].forEach(k => {
    const map = {chat_model:'chat-model', img_model:'img-model', sys_prompt:'sys-prompt'};
    const v = localStorage.getItem(k);
    if (v) $(map[k]).value = v;
  });
})();
$('chat-model').addEventListener('change', () => localStorage.setItem('chat_model', $('chat-model').value));
$('img-model').addEventListener('change', () => localStorage.setItem('img_model', $('img-model').value));
$('sys-prompt').addEventListener('change', () => localStorage.setItem('sys_prompt', $('sys-prompt').value));

// ── Settings toggle ──
let settingsOpen = false;
function toggleSettings() {
  settingsOpen = !settingsOpen;
  $('settings-drawer').classList.toggle('open', settingsOpen);
  $('settings-btn').classList.toggle('active', settingsOpen);
}

// ── PeerJS ──
let conn = null;
const peer = new Peer();
let peerReady = false;
peer.on('open', () => { peerReady = true; });

function setConn(state, label) {
  $('dot').className = 'dot ' + state;
  $('conn-lbl').textContent = label;
}

function connectToHost(id) {
  conn = peer.connect(id);
  conn.on('open', () => {
    setConn('ok', 'Connected');
    $('send-btn').disabled = false;
    note('Host connected. Device ready.');
  });
  conn.on('error', () => { setConn('err', 'Failed'); setTimeout(findHost, 3000); });
  conn.on('close', () => { setConn('err', 'Lost'); $('send-btn').disabled = true; setTimeout(findHost, 3000); });
}

function findHost() {
  setConn('wait', 'Connecting to LOCKS-MAC-HOME...');
  if (peerReady) {
    connectToHost('LOCKS-MAC-HOME');
  } else {
    peer.on('open', () => connectToHost('LOCKS-MAC-HOME'));
  }
}
findHost();

// ── Device ──
function setDevice(pct) {
  $('dev-fill').style.width = pct + '%';
  $('dev-pct').textContent = pct > 0 ? pct + '%' : '—';
}

function fireCmd(cmd) {
  if (!conn) return;
  conn.send(cmd);
  if (cmd.action === 'constant') setDevice(cmd.val);
  else if (cmd.action === 'stop') setDevice(0);
  else if (cmd.action === 'pattern') setDevice(Math.round(Math.max(...(cmd.vals||[0]))));
}

// ── Chat helpers ──
const chat = $('chat');
function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function bubble(cls, text, tag) {
  const d = document.createElement('div');
  d.className = 'bubble ' + cls;
  d.textContent = text;
  if (tag) {
    const t = document.createElement('div');
    t.className = 'cmd-tag';
    t.textContent = '⚡ ' + tag;
    d.appendChild(t);
  }
  chat.appendChild(d);
  scrollBottom();
  return d;
}

function note(text) {
  const d = document.createElement('div');
  d.className = 'bubble note';
  d.textContent = text;
  chat.appendChild(d);
  scrollBottom();
}

function imgLoading() {
  const d = document.createElement('div');
  d.className = 'img-loading';
  d.innerHTML = '<div class="img-spinner"></div><span>Generating image…</span>';
  chat.appendChild(d);
  scrollBottom();
  return d;
}

function showImage(b64, prompt) {
  const wrap = document.createElement('div');
  wrap.className = 'gen-image';
  const img = document.createElement('img');
  img.src = 'data:image/png;base64,' + b64;
  const lbl = document.createElement('div');
  lbl.className = 'gen-image-label';
  lbl.textContent = prompt.length > 60 ? prompt.slice(0,57)+'…' : prompt;
  wrap.appendChild(img);
  wrap.appendChild(lbl);
  chat.appendChild(wrap);
  scrollBottom();
}

// ── Parse AI reply ──
function parseCmd(text) {
  const m = [...text.matchAll(/\{[^{}]*"action"[^{}]*\}/g)];
  if (!m.length) return null;
  try { return JSON.parse(m[m.length-1][0]); } catch(e) { return null; }
}

function parseImagePrompt(text) {
  const m = text.match(/\[IMAGE:\s*([^\]]+)\]/i);
  return m ? m[1].trim() : null;
}

function cleanText(text) {
  return text
    .replace(/\{[^{}]*"action"[^{}]*\}\s*/g, '')
    .replace(/\[IMAGE:[^\]]*\]\s*/gi, '')
    .trim();
}

// ── Venice image gen ──
async function genImage(prompt) {
  const key = 'VENICE_INFERENCE_KEY_-D6dzG6kXZQK9JnVhM8qxjqbq8SFiAyqzbLSq5O2hb';
  const model = $('img-model').value;
  if (!key || model === 'none') return;

  const loader = imgLoading();

  try {
    const res = await fetch('https://api.venice.ai/api/v1/image/generate', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        prompt,
        width: 512, height: 768,
        steps: 20,
        safe_mode: false
      })
    });
    loader.remove();
    if (!res.ok) { note('Image failed: ' + res.status); return; }
    const data = await res.json();
    const b64 = data.images?.[0];
    if (b64) showImage(b64, prompt);
    else note('No image returned');
  } catch(e) {
    loader.remove();
    note('Image error: ' + e.message);
  }
}

// ── Venice chat ──
const history = [];

async function callAI(userMsg) {
  const key = 'VENICE_INFERENCE_KEY_-D6dzG6kXZQK9JnVhM8qxjqbq8SFiAyqzbLSq5O2hb';
  const model = $('chat-model').value;
  const sys = $('sys-prompt').value;

  history.push({ role: 'user', content: userMsg });

  const thinking = bubble('thinking', '...');

  // Strip commands/image tags from history so model doesn't loop on its own output
  const cleanHistory = history.map(m => ({
    role: m.role,
    content: m.role === 'assistant' ? cleanText(m.content) : m.content
  }));

  try {
    const res = await fetch('https://api.venice.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        max_tokens: 500,
        temperature: 0.92,
        presence_penalty: 0.6,
        frequency_penalty: 0.5,
        messages: [{ role: 'system', content: sys }, ...cleanHistory],
        venice_parameters: { include_venice_system_prompt: false }
      })
    });

    thinking.remove();

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      note('Venice error: ' + (err.error?.message || res.status));
      history.pop();
      return;
    }

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '';
    history.push({ role: 'assistant', content: raw });

    const cmd = parseCmd(raw);
    const imgPrompt = parseImagePrompt(raw);
    const display = cleanText(raw);

    let cmdLabel = null;
    if (cmd) {
      fireCmd(cmd);
      if (cmd.action === 'constant') cmdLabel = `constant ${cmd.val}%`;
      else if (cmd.action === 'stop') cmdLabel = 'stop';
      else if (cmd.action === 'pattern') cmdLabel = `pattern [${(cmd.vals||[]).slice(0,4).join(',')}…]`;
    }

    bubble('ai', display || '…', cmdLabel);

    if (imgPrompt) genImage(imgPrompt); // fire async, don't await


  } catch(e) {
    thinking.remove();
    note('Network error: ' + e.message);
    history.pop();
  }
}

// ── Send ──
async function send() {
  const input = $('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  // Hard stop keyword — cuts device immediately, no AI call
  if (text.toLowerCase() === 'stop') {
    fireCmd({ action: 'stop' });
    note('Device stopped.');
    return;
  }
  bubble('user', text);
  $('send-btn').disabled = true;
  await callAI(text);
  $('send-btn').disabled = false;
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Wake lock
try { if ('wakeLock' in navigator) navigator.wakeLock.request('screen'); } catch(e) {}
</script>

  <button id="pwa-install-btn" onclick="pwaInstall()">⬇ Install App</button>
  <script>
  var _deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault(); _deferredPrompt = e;
    document.getElementById('pwa-install-btn').classList.add('visible');
  });
  window.addEventListener('appinstalled', function() {
    document.getElementById('pwa-install-btn').classList.remove('visible');
  });
  function pwaInstall() {
    if (_deferredPrompt) {
      _deferredPrompt.prompt();
      _deferredPrompt.then(function(){ _deferredPrompt = null; });
    } else {
      alert('Use browser menu → "Add to Home Screen" or "Install App"');
    }
  }
  </script>
</body>
</html>
